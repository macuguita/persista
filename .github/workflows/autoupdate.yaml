name: Update deps.json

on:
  push:
    paths:
      - "gradle/libs.versions.toml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "**/build.gradle.kts"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Update deps.json
        run: |
          $(nix build .#packages.x86_64-linux.default.mitmCache.updateScript --print-out-paths)

      - name: Commit changes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add deps.json
            git commit -m "chore: update deps.json"
            git push
          fi
